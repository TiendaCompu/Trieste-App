<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>ZYTRONIX Login</title><style>body{margin:0;font-family:Inter,Arial;background:radial-gradient(circle at top left,rgba(0,104,255,.25),transparent 28%),linear-gradient(180deg,#040911,#07111d);color:white;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}*{box-sizing:border-box}.bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;opacity:.25}.card{position:relative;width:420px;background:linear-gradient(145deg,rgba(17,36,57,.96),rgba(8,21,35,.98));border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:34px;box-shadow:0 30px 120px rgba(0,0,0,.45)}h1{margin:0;font-size:38px;letter-spacing:3px}p{color:#94a3b8}.logo{font-size:14px;color:#60a5fa;font-weight:900;letter-spacing:3px;margin-bottom:10px}.field{margin-top:18px}.field label{display:block;margin-bottom:8px;color:#cbd5e1;font-size:14px}.field input{width:100%;padding:16px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:white;font-size:15px;outline:none}.btn{width:100%;margin-top:22px;border:0;border-radius:16px;padding:16px;background:linear-gradient(135deg,#0877ff,#004ee8);color:white;font-weight:900;font-size:15px;cursor:pointer}.meta{display:flex;justify-content:space-between;align-items:center;margin-top:16px;font-size:13px;color:#94a3b8}.badge{display:inline-flex;padding:6px 10px;border-radius:999px;background:#163d75;color:#93c5fd;font-size:12px;font-weight:900}.footer{text-align:center;margin-top:26px;font-size:12px;color:#64748b}.demo{margin-top:20px;padding:14px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}.demo b{display:block;margin-bottom:6px}.status{margin-top:16px;padding:12px;border-radius:14px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);display:none}</style></head><body><div class='bg'></div><div class='card'><div class='logo'>ZYTRONIX</div><h1>Bienvenido</h1><p>Plataforma SaaS automotriz inteligente.</p><div class='field'><label>Correo electrónico</label><input id='email' type='email' placeholder='usuario@zytronix.online'></div><div class='field'><label>Contraseña</label><input id='password' type='password' placeholder='••••••••'></div><button class='btn' onclick='login()'>Iniciar sesión</button><div class='meta'><span class='badge'>JWT Ready</span><span>v0.1.0</span></div><div class='demo'><b>Modo demostración</b><small>El backend JWT ya fue preparado para autenticación real con PostgreSQL y roles multiempresa.</small></div><div class='status' id='status'>Sesión iniciada correctamente.</div><div class='footer'>© 2026 ZYTRONIX Platform · Diseño: Christian Lahesa</div></div><script>async function login(){const email=document.getElementById('email').value;const password=document.getElementById('password').value;try{const response=await fetch('http://localhost:8000/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});if(response.ok){const data=await response.json();localStorage.setItem('zytronix_token',data.access_token);document.getElementById('status').style.display='block';setTimeout(()=>{window.location.href='./index.html';},1200);}else{alert('Credenciales inválidas');}}catch(error){alert('Backend no disponible aún.');}}</script></body></html>
