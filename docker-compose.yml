version: '3.9'

services:
  zytronix_api:
    build:
      context: ./backend
    container_name: zytronix_api
    restart: always
    ports:
      - '8000:8000'
    env_file:
      - .env
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: zytronix_postgres
    restart: always
    env_file:
      - .env
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:latest
    container_name: zytronix_nginx
    restart: always
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./react:/usr/share/nginx/html:ro
    depends_on:
      - zytronix_api

volumes:
  postgres_data:
