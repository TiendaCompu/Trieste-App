<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZYTRONIX - Vista React</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{--bg:#07111d;--sidebar:#081522;--panel:#0c1b2a;--panel2:#102236;--border:rgba(255,255,255,.08);--muted:#94a3b8;--blue:#0068ff;--green:#22c55e;--orange:#f59e0b;--red:#ef4444;--purple:#a855f7}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top left,rgba(0,104,255,.15),transparent 28%),linear-gradient(180deg,#050b14,#07111d);color:white}.layout{display:grid;grid-template-columns:292px 1fr;min-height:100vh}.sidebar{background:rgba(8,21,34,.94);border-right:1px solid var(--border);padding:20px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;backdrop-filter:blur(18px)}.brand{border-bottom:1px solid var(--border);padding:4px 8px 22px}.brand h1{margin:0;font-size:31px;letter-spacing:2px;font-weight:950;text-shadow:0 0 28px rgba(0,104,255,.35)}.brand p{margin:7px 0;color:#cbd5e1}.brand small{color:var(--muted)}.nav-title{margin:20px 8px 8px;color:#7e8ba4;font-size:12px;font-weight:900;letter-spacing:.7px}nav{display:flex;flex-direction:column;gap:8px;margin-top:0}nav button{height:44px;border:0;border-radius:11px;background:transparent;color:white;text-align:left;padding:0 13px;cursor:pointer;font-weight:780;display:flex;align-items:center;gap:12px;transition:.18s ease}nav button.active,nav button:hover{background:linear-gradient(135deg,#0877ff,#004ee8);box-shadow:0 14px 30px rgba(0,104,255,.32);transform:translateX(2px)}.nav-icon{width:25px;height:25px;border-radius:8px;display:grid;place-items:center;background:rgba(255,255,255,.075);color:white}.nav-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round}.ai-widget{margin-top:auto;border:1px solid var(--border);border-radius:16px;padding:14px;background:linear-gradient(135deg,rgba(0,104,255,.17),rgba(168,85,247,.09));display:flex;gap:12px;align-items:center}.ai-orb{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle,#38bdf8,#0b5cff 60%,#1e1b4b);display:grid;place-items:center;font-weight:950;box-shadow:0 0 30px rgba(0,104,255,.65)}.ai-widget strong{display:block}.ai-widget small{color:#cbd5e1;display:block;margin-top:4px}.content{padding:24px}.topbar{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:22px;gap:18px}.topbar h2{margin:0;font-size:27px}.topbar p{color:var(--muted);margin:6px 0 0}.top-actions{display:flex;align-items:center;gap:14px}.top-search{width:330px;height:42px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.045);color:white;padding:0 14px;outline:none}.userbox{display:flex;align-items:center;gap:13px}.badge{background:var(--red);border-radius:50px;padding:4px 8px;font-size:12px;box-shadow:0 0 20px rgba(239,68,68,.35)}.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#e2e8f0,#64748b);border:2px solid rgba(255,255,255,.18)}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px}.card,.panel,.settings-card{background:linear-gradient(145deg,rgba(17,36,57,.9),rgba(8,21,35,.92));border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 18px 60px rgba(0,0,0,.25);position:relative;overflow:hidden}.card:before,.panel:before,.settings-card:before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.045),transparent 35%);pointer-events:none}.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}.stat-icon{width:48px;height:48px;border-radius:13px;display:grid;place-items:center;background:rgba(0,104,255,.18);color:#60a5fa}.stat-icon svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round}.card h3{margin:0;color:#cbd5e1;font-size:15px}.card strong{display:block;margin-top:12px;font-size:34px}.card p,.panel p{color:var(--muted);margin:8px 0 0}.dashboard-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:18px}.panel-header{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:16px}.panel-header h3{margin:0;font-size:21px}.outline-button,.primary-button,.search-row button{border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.04);color:white;padding:11px 16px;font-weight:800;cursor:pointer}.primary-button,.search-row button{border:0;background:linear-gradient(135deg,#0877ff,#004ee8)}.orders-table{width:100%;border-collapse:collapse;margin-top:10px}.orders-table th{text-align:left;color:#8fa0b7;font-size:13px;padding:12px 8px;border-bottom:1px solid var(--border)}.orders-table td{padding:13px 8px;border-bottom:1px solid var(--border);font-size:14px}.status-pill{display:inline-flex;border-radius:8px;background:rgba(0,104,255,.22);color:#60a5fa;padding:6px 9px;font-size:12px;font-weight:900}.danger-pill{background:rgba(239,68,68,.22);color:#fecaca}.alert{border-radius:13px;padding:13px;margin-top:12px;border:1px solid var(--border)}.alert strong{display:block}.alert span{color:#cbd5e1;font-size:13px}.danger{background:rgba(239,68,68,.12)}.warning{background:rgba(245,158,11,.12)}.info{background:rgba(0,104,255,.12)}.search-row{display:flex;gap:10px;margin-top:15px}.search-row input,.form-grid input,.form-grid select,textarea{width:100%;background:rgba(255,255,255,.045);border:1px solid var(--border);border-radius:10px;color:white;padding:13px;outline:none}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}.large-textarea{min-height:110px;margin-top:14px}.actions-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}.quote-header,.vehicle-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:15px 0}.quote-header div,.vehicle-summary div{background:rgba(255,255,255,.035);border:1px solid var(--border);border-radius:12px;padding:14px}.quote-header label,.vehicle-summary span{display:block;color:var(--muted);font-size:12px;margin-bottom:7px}.totals-box{margin-top:18px;margin-left:auto;max-width:330px;background:rgba(255,255,255,.035);border:1px solid var(--border);border-radius:14px;padding:14px}.totals-box div{display:flex;justify-content:space-between;padding:8px 0}.grand-total{border-top:1px solid var(--border);font-size:20px}.timeline{margin-top:20px;display:grid;gap:14px}.timeline-item{display:grid;grid-template-columns:120px 1fr;gap:14px}.timeline-date{color:#cbd5e1;font-weight:900;padding-top:12px}.timeline-card{background:rgba(255,255,255,.035);border:1px solid var(--border);border-radius:14px;padding:15px}.settings-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.single{grid-template-columns:1fr}.brand-preview{background:rgba(0,104,255,.12);border:1px solid var(--border);border-radius:14px;padding:20px}.brand-preview strong{display:block;font-size:28px;letter-spacing:2px}.brand-preview span,.brand-preview small{display:block;color:#cbd5e1;margin-top:7px}@media(max-width:1050px){.layout{grid-template-columns:1fr}.sidebar{height:auto;position:relative}.cards,.dashboard-grid,.quote-header,.vehicle-summary,.settings-grid,.form-grid{grid-template-columns:1fr}.orders-table{min-width:760px}.table-wrap{overflow:auto}.topbar,.top-actions{align-items:flex-start;flex-direction:column}.top-search{width:100%}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const {useState}=React;
    const svg={dash:<svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zM13 21h8v-8h-8v8zM13 3v6h8V3h-8zM3 21h8v-6H3v6z"/></svg>,car:<svg viewBox="0 0 24 24"><path d="M7 17h10M5 17h14l-1.5-6h-11L5 17zM7 17v2M17 17v2M8 11l1.5-4h5L16 11"/></svg>,orders:<svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>,quote:<svg viewBox="0 0 24 24"><path d="M6 2h9l5 5v15H6V2z"/><path d="M14 2v6h6M9 13h6M9 17h4"/></svg>,history:<svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5M12 7v5l3 2"/></svg>,clients:<svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>,vehicle:<svg viewBox="0 0 24 24"><path d="M5 16h14M6 16v2M18 16v2M4 13l2-6h12l2 6"/><circle cx="7" cy="16" r="1"/><circle cx="17" cy="16" r="1"/></svg>,inventory:<svg viewBox="0 0 24 24"><path d="M21 16V8l-9-5-9 5v8l9 5 9-5z"/><path d="M3.3 7.5 12 12l8.7-4.5M12 22V12"/></svg>,mechanic:<svg viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5 5L3 18v3h3l6.7-6.7a4 4 0 0 0 5-5l-3 3-2-2 3-3z"/></svg>,config:<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>,money:<svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7H14a3.5 3.5 0 0 1 0 7H6"/></svg>,check:<svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>};
    const modules=[['Dashboard','dash'],['Ingreso al Taller','car'],['Órdenes de Trabajo','orders'],['Presupuestos','quote'],['Historial Vehículo','history'],['Clientes','clients'],['Vehículos','vehicle'],['Inventario','inventory'],['Mecánicos','mechanic'],['Configuración','config']];
    const stats=[['Órdenes Activas','15','Vehículos en proceso','mechanic'],['Ingresos Hoy','8','Nuevos vehículos','car'],['Por Entregar','5','Listos para cliente','check'],['Estimado Diario','$2,450','Monto operativo','money']];
    const orders=[['OT-2026-001','ABC-123','Toyota Corolla 2020','En proceso','$450'],['OT-2026-002','DEF-456','Mazda 3 2019','Por entregar','$320'],['OT-2026-003','GHI-789','Chevrolet Spark 2021','Pendiente','$280']];
    function Sidebar({active,setActive}){return <aside className="sidebar"><div className="brand"><h1>ZYTRONIX</h1><p>Sistema Electrónico Automatizado</p><small>Centro de Servicio Automotriz Trieste</small></div><div className="nav-title">OPERACIÓN</div><nav>{modules.map(([m,i])=><button key={m} onClick={()=>setActive(m)} className={active===m?'active':''}><span className="nav-icon">{svg[i]}</span><span>{m}</span></button>)}</nav><div className="ai-widget"><div className="ai-orb">AI</div><div><strong>ZYTRONIX AI</strong><small>Asistente operativo futuro</small></div></div></aside>}
    function Topbar({title}){return <header className="topbar"><div><h2>{title}</h2><p>Plataforma SaaS para talleres automotrices</p></div><div className="top-actions"><input className="top-search" placeholder="Buscar vehículo, orden o cliente..."/><span className="badge">3</span><div className="userbox"><div className="avatar"></div><div><strong>Administrador</strong><br/><small>admin@zytronix.online</small></div></div></div></header>}
    function Cards(){return <section className="cards">{stats.map(s=><div className="card" key={s[0]}><div className="card-head"><div><h3>{s[0]}</h3><strong>{s[1]}</strong><p>{s[2]}</p></div><div className="stat-icon">{svg[s[3]]}</div></div></div>)}</section>}
    function Dashboard(){return <><Cards/><section className="dashboard-grid"><div className="panel"><div className="panel-header"><div><h3>Órdenes Recientes</h3><p>Movimiento operativo del taller</p></div><button className="outline-button">Ver todas</button></div><div className="table-wrap"><table className="orders-table"><thead><tr><th>Orden</th><th>Matrícula</th><th>Vehículo</th><th>Estado</th><th>Total</th></tr></thead><tbody>{orders.map(o=><tr key={o[0]}><td>{o[0]}</td><td>{o[1]}</td><td>{o[2]}</td><td><span className="status-pill">{o[3]}</span></td><td>{o[4]}</td></tr>)}</tbody></table></div></div><div className="panel"><h3>Alertas Operativas</h3><div className="alert danger"><strong>3 órdenes detenidas</strong><span>Esperando aprobación del cliente</span></div><div className="alert warning"><strong>5 repuestos pendientes</strong><span>Compras debe confirmar proveedores</span></div><div className="alert info"><strong>2 vehículos listos</strong><span>Pendientes por entregar</span></div></div></section><section className="panel"><h3>Búsqueda rápida por matrícula</h3><p>El flujo principal comienza buscando el vehículo.</p><div className="search-row"><input placeholder="Ejemplo: ABC-123"/><button>Buscar vehículo</button></div></section></>}
    function Ingreso(){return <section className="panel"><div className="panel-header"><div><h3>Ingreso al Taller</h3><p>Registro inicial operativo del vehículo.</p></div><button className="outline-button">Buscar Matrícula</button></div><div className="form-grid"><input placeholder="Matrícula"/><input placeholder="Kilometraje"/><input placeholder="Marca"/><input placeholder="Modelo"/><input placeholder="Año"/><input placeholder="Color"/><input placeholder="Serial de carrocería"/><input placeholder="Cliente / Empresa"/></div><textarea className="large-textarea" placeholder="Observaciones indicadas por el cliente"></textarea><div className="actions-row"><button className="primary-button">Crear Orden de Trabajo</button><button className="outline-button">Guardar Borrador</button></div></section>}
    function Ordenes(){return <section className="panel"><div className="panel-header"><div><h3>Órdenes de Trabajo</h3><p>Control de diagnóstico, reparación, repuestos y entrega.</p></div><button className="primary-button">Nueva Orden</button></div><div className="table-wrap"><table className="orders-table"><thead><tr><th>Orden</th><th>Matrícula</th><th>Cliente</th><th>Vehículo</th><th>Estado</th><th>Mecánico</th><th>Total</th></tr></thead><tbody><tr><td>OT-2026-001</td><td>ABC-123</td><td>Trieste</td><td>Toyota Corolla 2020</td><td><span className="status-pill">En diagnóstico</span></td><td>Jefe de Taller</td><td>$450</td></tr><tr><td>OT-2026-002</td><td>DEF-456</td><td>Cliente Jurídico Demo</td><td>Mazda 3 2019</td><td><span className="status-pill">Esperando aprobación</span></td><td>Carlos Mendoza</td><td>$320</td></tr></tbody></table></div></section>}
    function Presupuestos(){const items=[['Servicio','Diagnóstico general',1,'$25','0%','$25'],['Repuesto','Radiador principal',1,'$180','30%','$234'],['Mano de obra','Instalación y prueba',1,'$60','0%','$60'],['Consumible','Refrigerante',2,'$12','25%','$30']];return <section className="panel"><div className="panel-header"><div><h3>Presupuesto</h3><p>Documento operativo para aprobación del cliente.</p></div><div className="actions-row"><button className="outline-button">Guardar</button><button className="primary-button">Enviar al Cliente</button></div></div><div className="quote-header"><div><label>Cliente</label><strong>Centro de Servicio Automotriz Trieste</strong></div><div><label>Matrícula</label><strong>ABC-123</strong></div><div><label>Vehículo</label><strong>Toyota Corolla 2020</strong></div><div><label>Moneda</label><strong>USD</strong></div></div><div className="table-wrap"><table className="orders-table"><thead><tr><th>Tipo</th><th>Descripción</th><th>Cantidad</th><th>Costo</th><th>Utilidad</th><th>Total</th></tr></thead><tbody>{items.map((i,idx)=><tr key={idx}>{i.map((c,j)=><td key={j}>{c}</td>)}</tr>)}</tbody></table></div><div className="totals-box"><div><span>Subtotal</span><strong>$349</strong></div><div><span>Descuento</span><strong>$0</strong></div><div className="grand-total"><span>Total</span><strong>$349</strong></div></div></section>}
    function Historial(){const h=[['12/01/2026','OT-2026-001','Recalentamiento','Cambio de radiador, refrigerante y prueba de presión','Carlos Mendoza','$349'],['18/10/2025','OT-2025-087','Mantenimiento preventivo','Cambio de aceite, filtro y revisión general','Luis Herrera','$95'],['02/06/2025','OT-2025-041','Ruido en tren delantero','Diagnóstico de suspensión y ajuste general','Jefe de Taller','$60']];return <section className="panel"><h3>Historial del Vehículo</h3><p>Consulta cronológica de trabajos, costos, mecánicos y observaciones.</p><div className="search-row"><input placeholder="Buscar por matrícula: ABC-123"/><button>Buscar historial</button></div><div className="vehicle-summary"><div><span>Matrícula</span><strong>ABC-123</strong></div><div><span>Vehículo</span><strong>Toyota Corolla 2020</strong></div><div><span>Cliente</span><strong>Centro de Servicio Automotriz Trieste</strong></div><div><span>Visitas</span><strong>3</strong></div></div><div className="timeline">{h.map(x=><div className="timeline-item" key={x[1]}><div className="timeline-date">{x[0]}</div><div className="timeline-card"><div className="panel-header"><div><h4>{x[1]} · {x[2]}</h4><p>{x[3]}</p></div><strong>{x[5]}</strong></div><small>Mecánico: {x[4]}</small></div></div>)}</div></section>}
    function Inventario(){const inv=[['REP-001','Filtro de aceite','Consumible',2,10,'$8','Crítico'],['REP-002','Aceite 5W-30','Consumible',3,15,'$12','Crítico'],['REP-003','Pastillas de freno','Repuesto',1,8,'$35','Crítico'],['REP-004','Bombillo H4','Eléctrico',18,6,'$5','Disponible']];return <section className="panel"><div className="panel-header"><div><h3>Inventario</h3><p>Control de repuestos, consumibles, stock mínimo y alertas.</p></div><button className="primary-button">Nuevo Repuesto</button></div><section className="cards"><div className="card"><h3>Repuestos</h3><strong>142</strong><p>Registrados</p></div><div className="card"><h3>Críticos</h3><strong>3</strong><p>Bajo mínimo</p></div><div className="card"><h3>Valor Stock</h3><strong>$4,820</strong><p>Estimado</p></div><div className="card"><h3>Movimientos</h3><strong>28</strong><p>Este mes</p></div></section><div className="table-wrap"><table className="orders-table"><thead><tr><th>Código</th><th>Producto</th><th>Categoría</th><th>Stock</th><th>Mínimo</th><th>Precio</th><th>Estado</th></tr></thead><tbody>{inv.map(i=><tr key={i[0]}>{i.map((c,idx)=><td key={idx}>{idx===6?<span className={c==='Crítico'?'status-pill danger-pill':'status-pill'}>{c}</span>:c}</td>)}</tr>)}</tbody></table></div></section>}
    function Config(){return <section className="panel"><div className="panel-header"><div><h3>Configuración del Taller</h3><p>Personalización de datos, moneda, tasas y operación.</p></div><button className="primary-button">Guardar Cambios</button></div><div className="settings-grid"><div className="settings-card"><h4>Identidad del Taller</h4><div className="form-grid"><input defaultValue="Centro de Servicio Automotriz Trieste"/><input defaultValue="J-00000000-0"/><input defaultValue="+58 000-0000000"/><input defaultValue="contacto@trieste.com"/></div><textarea className="large-textarea" placeholder="Dirección fiscal"></textarea></div><div className="settings-card"><h4>Monedas y Tasas</h4><div className="form-grid"><select defaultValue="USD"><option>USD</option><option>VES</option><option>EUR</option></select><input defaultValue="36.50"/><input defaultValue="39.20"/><input defaultValue="2026-05-12"/></div></div><div className="settings-card"><h4>Operación</h4><div className="form-grid"><select><option>Aprobación manual de presupuestos</option></select><select><option>Controlar comisiones</option></select><select><option>Alertar stock mínimo</option></select></div></div><div className="settings-card"><h4>Marca Visual</h4><div className="brand-preview"><strong>ZYTRONIX</strong><span>Sistema Electrónico Automatizado</span><small>Logo e identidad del taller configurables.</small></div></div></div></section>}
    function Placeholder({active}){return <section className="panel"><h3>{active}</h3><p>Módulo en construcción para la plataforma ZYTRONIX.</p></section>}
    function App(){const [active,setActive]=useState('Dashboard'); const pages={'Dashboard':<Dashboard/>,'Ingreso al Taller':<Ingreso/>,'Órdenes de Trabajo':<Ordenes/>,'Presupuestos':<Presupuestos/>,'Historial Vehículo':<Historial/>,'Inventario':<Inventario/>,'Configuración':<Config/>}; return <div className="layout"><Sidebar active={active} setActive={setActive}/><main className="content"><Topbar title={active}/>{pages[active]||<Placeholder active={active}/>}</main></div>}
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
